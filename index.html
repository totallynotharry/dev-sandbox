<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lightning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Backgrounds - neutral dark grey, no blue */
  --bg:          #0e0e0e;
  --bg2:         #161616;
  --bg3:         #1e1e1e;

  /* Surfaces / borders */
  --surface:     rgba(255,255,255,0.04);
  --surface-h:   rgba(255,255,255,0.07);
  --border:      rgba(255,255,255,0.09);
  --border-h:    rgba(245,196,60,0.45);

  /* Gold accent - used sparingly */
  --gold:        #f5c43c;
  --gold-bright: #ffd966;
  --gold-dim:    rgba(245,196,60,0.12);
  --gold-glow:   rgba(245,196,60,0.2);

  /* Text — warmer neutrals, no blue tint */
  --text:        #e0e0e0;
  --text2:       #999999;
  --muted:       #555555;
  --muted2:      #888888;

  --font:        'DM Sans', sans-serif;
  --font-d:      'Sora', sans-serif;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  height: 100vh;
}

/* ── Canvas ── */
#cvs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

/* ── Pages ── */
.page {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1; opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease; overflow: hidden;
}
.page.active { opacity: 1; pointer-events: all; }

/* ══════════════════════════════
   HOME
══════════════════════════════ */
#home { gap: 0; }

.home-title {
  font-family: var(--font-d);
  font-size: clamp(2.4rem, 5.5vw, 4rem);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 8px;
  text-shadow: 0 0 60px rgba(245,196,60,0.2);
}

.home-sub {
  font-size: 0.86rem;
  font-weight: 300;
  color: var(--muted2);
  letter-spacing: 0.04em;
  margin-bottom: 36px;
  font-style: italic;
}

/* Search */
.search-bar {
  display: flex; align-items: center;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 60px;
  padding: 9px 9px 9px 20px;
  width: min(520px, 90vw); gap: 10px;
  margin-bottom: 36px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-bar:focus-within {
  border-color: var(--border-h);
  box-shadow: 0 0 0 3px var(--gold-dim);
}
.search-bar svg { color: var(--muted); flex-shrink: 0; }

#home-search {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font);
  font-size: 0.92rem; font-weight: 300;
}
#home-search::placeholder { color: var(--muted); }

/* Engine picker */
.engine-wrap { position: relative; }
.engine-select {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 60px; padding: 6px 12px;
  cursor: pointer; font-size: 0.77rem;
  color: var(--muted2); white-space: nowrap;
  transition: background 0.15s; user-select: none;
}
.engine-select:hover { background: rgba(255,255,255,0.06); }

.engine-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  min-width: 148px; display: none; z-index: 99;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.engine-dropdown.open { display: block; }
.engine-opt {
  padding: 10px 16px; font-size: 0.82rem;
  color: var(--muted2); cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.engine-opt:hover { background: var(--surface-h); color: var(--text); }
.engine-opt.chosen { color: var(--gold); }

/* Go btn */
.go-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--gold); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.15s;
  box-shadow: 0 2px 14px var(--gold-glow);
}
.go-btn:hover { background: var(--gold-bright); transform: scale(1.06); }
.go-btn svg { color: #0e0f11; }

/* Nav icons */
.nav-icons { display: flex; gap: 24px; align-items: center; }
.nav-icon {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px; cursor: pointer;
}
.nav-circle {
  width: 56px; height: 56px; border-radius: 15px;
  background: var(--bg2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  transition: background 0.18s, border-color 0.18s,
              transform 0.18s, color 0.18s;
}
.nav-icon:hover .nav-circle {
  background: var(--gold-dim);
  border-color: rgba(245,196,60,0.3);
  transform: translateY(-3px);
  color: var(--gold);
}
.nav-label {
  font-size: 0.72rem; color: var(--muted2);
  font-weight: 400; letter-spacing: 0.02em;
}

/* ══════════════════════════════
   GAMES PAGE
══════════════════════════════ */
#games-page { justify-content: flex-start; overflow: hidden; }

.page-header {
  width: 100%;
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 24px 16px; flex-shrink: 0; gap: 14px;
}

.page-search {
  display: flex; align-items: center;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 60px; padding: 10px 20px;
  width: min(460px, 90vw); gap: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.page-search:focus-within {
  border-color: var(--border-h);
  box-shadow: 0 0 0 3px var(--gold-dim);
}
.page-search svg { color: var(--muted); flex-shrink: 0; }
.page-search input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 0.88rem;
}
.page-search input::placeholder { color: var(--muted); }

.filter-row { display: flex; gap: 8px; }
.chip {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 60px; padding: 5px 16px;
  font-size: 0.75rem; color: var(--muted2);
  cursor: pointer; transition: all 0.15s; font-family: var(--font);
}
.chip:hover { border-color: rgba(245,196,60,0.3); color: var(--text); }
.chip.active {
  background: var(--gold-dim);
  border-color: rgba(245,196,60,0.45); color: var(--gold);
}

.games-scroll {
  flex: 1; width: 100%; overflow-y: auto;
  padding: 8px 36px 48px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.07) transparent;
}
.games-scroll::-webkit-scrollbar { width: 4px; }
.games-scroll::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.07); border-radius: 2px;
}

#game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(142px, 1fr));
  gap: 12px; max-width: 1080px; margin: 0 auto;
}

.game-card {
  position: relative; border-radius: 18px; overflow: hidden;
  cursor: pointer; aspect-ratio: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
              box-shadow 0.22s, border-color 0.22s;
  animation: pop 0.28s ease both;
}
.game-card:hover {
  transform: scale(1.045) translateY(-2px);
  border-color: rgba(245,196,60,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6),
              0 0 0 1px rgba(245,196,60,0.2);
  z-index: 2;
}
.game-card:hover .card-overlay { opacity: 1; }
.game-card:hover .card-img { filter: brightness(0.45); }

.card-img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: filter 0.22s;
}
.card-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem; background: var(--bg3);
}
.card-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; opacity: 0; transition: opacity 0.22s;
}
.card-play {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px var(--gold-glow);
}
.card-play svg { color: #0e0f11; margin-left: 2px; }
.card-name-tip {
  font-size: 0.7rem; font-weight: 500; color: #fff;
  text-align: center; padding: 0 8px;
  line-height: 1.3; max-width: 100%;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
}

/* Proxy badge — shown on cards that will route through UV */
.badge-proxy {
  position: absolute; top: 7px; left: 7px;
  background: rgba(14,15,17,0.75);
  border: 1px solid rgba(245,196,60,0.4);
  color: var(--gold);
  font-size: 0.52rem; font-weight: 700;
  letter-spacing: 0.08em; padding: 2px 6px;
  border-radius: 60px; text-transform: uppercase; z-index: 3;
  backdrop-filter: blur(4px);
}
.badge-new {
  position: absolute; top: 7px; right: 7px;
  background: var(--gold); color: #0e0f11;
  font-size: 0.55rem; font-weight: 700;
  letter-spacing: 0.08em; padding: 2px 7px;
  border-radius: 60px; text-transform: uppercase; z-index: 3;
}

/* ══════════════════════════════
   PROXY PAGE
══════════════════════════════ */
#proxy-page { gap: 0; padding: 24px; }

.proxy-eyebrow {
  font-family: var(--font-d);
  font-size: 0.68rem; font-weight: 600;
  color: var(--muted); letter-spacing: 0.16em;
  text-transform: uppercase; margin-bottom: 6px;
}
.proxy-heading {
  font-family: var(--font-d);
  font-size: 2.2rem; font-weight: 700;
  color: var(--gold); letter-spacing: -0.02em;
  margin-bottom: 6px;
  text-shadow: 0 0 40px rgba(245,196,60,0.18);
}
.proxy-desc {
  font-size: 0.83rem; color: var(--muted2);
  margin-bottom: 30px; text-align: center; line-height: 1.6;
}

.proxy-bar {
  display: flex; align-items: center;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 60px; padding: 12px 12px 12px 22px;
  width: min(560px, 92vw); gap: 10px; margin-bottom: 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.proxy-bar:focus-within {
  border-color: var(--border-h);
  box-shadow: 0 0 0 3px var(--gold-dim);
}
.proxy-bar svg { color: var(--muted); flex-shrink: 0; }
#proxy-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 0.93rem;
}
#proxy-input::placeholder { color: var(--muted); }

.proxy-go {
  background: var(--gold); border: none; border-radius: 60px;
  padding: 8px 22px; color: #0e0f11;
  font-family: var(--font); font-weight: 600; font-size: 0.85rem;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 14px var(--gold-glow);
}
.proxy-go:hover {
  background: var(--gold-bright);
  box-shadow: 0 4px 22px rgba(245,196,60,0.35);
}

.proxy-status {
  font-size: 0.74rem; color: var(--muted);
  text-align: center; line-height: 1.7; margin-top: 4px;
}
.proxy-status .ok   { color: #6ee7b7; }
.proxy-status .warn { color: var(--gold); }

/* ══════════════════════════════
   MODAL / IFRAME
══════════════════════════════ */
#modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  flex-direction: column; background: #0a0a0a;
}
#modal.open { display: flex; }

.modal-bar {
  display: flex; align-items: center;
  padding: 10px 16px; gap: 10px;
  background: #141414;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title {
  flex: 1; font-family: var(--font-d);
  font-size: 0.88rem; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.modal-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px; color: var(--muted2);
  font-family: var(--font); font-size: 0.78rem; cursor: pointer;
  transition: all 0.15s; text-decoration: none;
  display: flex; align-items: center; gap: 5px;
}
.modal-btn:hover { border-color: var(--border-h); color: var(--text); }
.modal-btn.close:hover {
  background: rgba(239,68,68,0.1);
  border-color: rgba(239,68,68,0.45); color: #f87171;
}
#game-frame { flex: 1; width: 100%; border: none; }

/* ── Back ── */
.back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 10;
  display: none; align-items: center; gap: 7px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 60px; padding: 7px 16px 7px 12px;
  cursor: pointer; font-size: 0.8rem; color: var(--muted2);
  font-family: var(--font); transition: all 0.15s;
}
.back-btn:hover { border-color: var(--border-h); color: var(--text); }
.back-btn.visible { display: flex; }

/* ── Empty ── */
.empty-state {
  grid-column: 1/-1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 0; gap: 12px;
  color: var(--muted); font-size: 0.88rem;
}
.empty-state .ei { font-size: 2.4rem; opacity: 0.3; }

@keyframes pop {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

@media (max-width: 600px) {
  #game-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  .games-scroll { padding: 4px 14px 40px; }
}
</style>
</head>
<body>

<canvas id="cvs"></canvas>

<!-- UV — must be first, before any __uv$config reference -->
<script src="uv/uv.bundle.js"></script>
<script src="uv/uv.config.js"></script>

<button class="back-btn" id="back-btn">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Home
</button>

<!-- ══ HOME ══ -->
<div class="page active" id="home">
  <div class="home-title">lightning</div>
  <div class="home-sub">browse without limits</div>

  <div class="search-bar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input id="home-search" type="text" placeholder="search or enter a url…" autocomplete="off">
    <div class="engine-wrap">
      <div class="engine-select" id="engine-select">
        <span id="engine-label">DuckDuckGo</span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="engine-dropdown" id="engine-dd">
        <div class="engine-opt chosen" data-engine="https://duckduckgo.com/?q=">DuckDuckGo</div>
        <div class="engine-opt" data-engine="https://www.google.com/search?q=">Google</div>
        <div class="engine-opt" data-engine="https://www.bing.com/search?q=">Bing</div>
        <div class="engine-opt" data-engine="https://search.brave.com/search?q=">Brave</div>
      </div>
    </div>
    <button class="go-btn" id="search-go">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

  <div class="nav-icons">
    <div class="nav-icon" data-goto="games-page">
      <div class="nav-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 12h4M8 10v4M15 12h.01M18 12h.01"/></svg>
      </div>
      <span class="nav-label">games</span>
    </div>
    <div class="nav-icon" data-goto="proxy-page">
      <div class="nav-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <span class="nav-label">proxy</span>
    </div>
    <div class="nav-icon" data-open-proxy="https://prism.onl/page/media">
      <div class="nav-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><polygon points="10 9 15 12 10 15 10 9"/></svg>
      </div>
      <span class="nav-label">movies</span>
    </div>
    <div class="nav-icon" data-open-proxy="https://prism.onl/page/music">
      <div class="nav-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <span class="nav-label">music</span>
    </div>
  </div>
</div>

<!-- ══ GAMES ══ -->
<div class="page" id="games-page">
  <div class="page-header">
    <div class="page-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="game-search" placeholder="search games…" autocomplete="off">
    </div>
    <div class="filter-row">
      <div class="chip active" data-filter="all">All</div>
      <div class="chip" data-filter="new">✦ New</div>
    </div>
  </div>
  <div class="games-scroll">
    <div id="game-grid">
      <div class="empty-state"><div class="ei">⚡</div><span>Loading games…</span></div>
    </div>
  </div>
</div>

<!-- ══ PROXY ══ -->
<div class="page" id="proxy-page">
  <div class="proxy-eyebrow">Ultraviolet</div>
  <div class="proxy-heading">Web Proxy</div>
  <div class="proxy-desc">Route any site through UV — bypass filters, browse freely.</div>

  <div class="proxy-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <input id="proxy-input" type="text" placeholder="https://example.com or search term…" autocomplete="off">
    <button class="proxy-go" id="proxy-go">Go</button>
  </div>

  <div class="proxy-status" id="proxy-status">
    Checking service worker… <span class="warn">●</span>
  </div>
</div>

<!-- ══ MODAL IFRAME ══ -->
<div id="modal">
  <div class="modal-bar">
    <div class="modal-title" id="modal-title">—</div>
    <button id="fullscreen-btn" class="modal-btn">
      <svg id="fs-expand" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 00-2 2v3M21 8V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3M16 21h3a2 2 0 002-2v-3"/></svg>
      <svg id="fs-shrink" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M8 3v3a2 2 0 01-2 2H3M21 8h-3a2 2 0 01-2-2V3M3 16h3a2 2 0 012 2v3M16 21v-3a2 2 0 012-2h3"/></svg>
      <span id="fs-label">Fullscreen</span>
    </button>
    <button class="modal-btn close" id="close-modal">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Close
    </button>
  </div>
  <iframe id="game-frame" allowfullscreen allow="fullscreen; autoplay; payment"></iframe>
</div>

<script>
'use strict';

// ══ Constellation (mouse-reactive + spring-back) ══════════
(function () {
  const c = document.getElementById('cvs');
  const ctx = c.getContext('2d');
  let pts = [], W, H;
  const N          = 80;
  const LINK_DIST  = 150;
  const MOUSE_PULL = 180;   // radius mouse attracts within
  const PULL_STR   = 0.022; // attraction toward cursor
  const SPRING     = 0.018; // spring back toward home
  const DAMP       = 0.88;  // velocity damping
  const GOLD_ZONE  = 130;   // radius for gold highlight

  let mx = -9999, my = -9999; // raw mouse
  let smx = -9999, smy = -9999; // smoothed mouse
  let mouseIn = false;

  window.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY; mouseIn = true;
  });
  window.addEventListener('mouseleave', () => {
    mouseIn = false; mx = -9999; my = -9999;
  });

  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }

  function init() {
    resize();
    pts = Array.from({ length: N }, () => {
      const hx = Math.random() * W;
      const hy = Math.random() * H;
      return {
        x: hx, y: hy,     // current pos
        hx, hy,            // home position
        vx: 0, vy: 0,
        r:  Math.random() * 1.1 + .35,
        a:  Math.random() * Math.PI * 2,
        pa: Math.random() * .005 + .002
      };
    });
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    // Smooth mouse
    if (mouseIn) {
      smx += (mx - smx) * 0.07;
      smy += (my - smy) * 0.07;
    } else {
      // When mouse gone, smoothed pos fades to offscreen
      smx += (-9999 - smx) * 0.04;
      smy += (-9999 - smy) * 0.04;
    }

    // Gold bloom follows smoothed mouse
    if (mouseIn) {
      const mg = ctx.createRadialGradient(smx, smy, 0, smx, smy, MOUSE_PULL * 1.5);
      mg.addColorStop(0, 'rgba(245,196,60,0.055)');
      mg.addColorStop(1, 'transparent');
      ctx.fillStyle = mg;
      ctx.fillRect(0, 0, W, H);
    }

    // Update particles
    for (const p of pts) {
      p.a += p.pa;

      if (mouseIn) {
        // Pull toward cursor
        const dx = smx - p.x, dy = smy - p.y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < MOUSE_PULL && d > 1) {
          const f = (1 - d / MOUSE_PULL) * PULL_STR;
          p.vx += (dx / d) * f;
          p.vy += (dy / d) * f;
        }
      }

      // Always spring toward home position
      p.vx += (p.hx - p.x) * SPRING;
      p.vy += (p.hy - p.y) * SPRING;

      // Dampen
      p.vx *= DAMP; p.vy *= DAMP;
      p.x  += p.vx; p.y  += p.vy;
    }

    // Lines
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d >= LINK_DIST) continue;

        const t = 1 - d / LINK_DIST;
        const nearMouse = mouseIn && (
          Math.hypot(pts[i].x - smx, pts[i].y - smy) < GOLD_ZONE ||
          Math.hypot(pts[j].x - smx, pts[j].y - smy) < GOLD_ZONE
        );

        ctx.beginPath();
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.strokeStyle = nearMouse
          ? `rgba(245,196,60,${t * 0.55})`
          : `rgba(170,165,155,${t * 0.09})`;
        ctx.lineWidth = nearMouse ? 1 : .55;
        ctx.stroke();
      }
    }

    // Dots
    for (const p of pts) {
      const nearMouse = mouseIn && Math.hypot(p.x - smx, p.y - smy) < GOLD_ZONE;
      const al = (Math.sin(p.a) + 1) / 2 * .45 + .1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, nearMouse ? p.r * 1.8 : p.r, 0, Math.PI * 2);
      ctx.fillStyle = nearMouse
        ? `rgba(245,196,60,${Math.min(al * 2.2, 0.9)})`
        : `rgba(190,185,170,${al})`;
      ctx.fill();
    }

    requestAnimationFrame(frame);
  }

  addEventListener('resize', () => {
    resize();
    // Rescale home positions proportionally
    const sx = W / (c.width  || W);
    const sy = H / (c.height || H);
    for (const p of pts) { p.hx *= sx; p.hy *= sy; }
  });
  init(); frame();
})();

// ══ UV helpers ═════════════════════════════════════════════
// __uv$config provided by uv/uv.config.js

function uvUrl(url) {
  return __uv$config.prefix + __uv$config.encodeUrl(url);
}

// From download.js — checks if a string is a navigable URL
function isUrl(val = '') {
  if (/^http(s?):\/\//.test(val)) return true;
  if (val.includes('.') && val.substr(0, 1) !== ' ') return true;
  return false;
}

/**
 * Decide how to open a game URL:
 *  - Relative paths like /games/slope  → load directly in iframe (no UV needed)
 *  - Absolute https:// URLs            → route through UV
 */
function isAbsoluteUrl(url) {
  return /^https?:\/\//i.test(url);
}

function resolveSearchUrl(raw, engine) {
  if (!raw) return null;
  if (/^https?:\/\//i.test(raw)) return raw;
  if (/^[\w-]+(\.[a-z]{2,})+/i.test(raw.split('/')[0])) return 'https://' + raw;
  return engine + encodeURIComponent(raw);
}

// ══ Service Worker ═════════════════════════════════════════
// Following the same pattern as download.js:
// Register SW fresh each time before proxying, then navigate.
// This ensures the SW is controlling the page before we set iframe.src.

function setStatus(html) {
  const el = document.getElementById('proxy-status');
  if (el) el.innerHTML = html;
}

/**
 * Registers (or re-uses) the SW and resolves when it's active and controlling.
 * Returns a Promise so callers can await it before setting iframe.src.
 */
function ensureSW() {
  if (!('serviceWorker' in navigator)) {
    setStatus('Service workers not supported in this browser.');
    return Promise.reject('no-sw');
  }

  return navigator.serviceWorker.register('./sw.js', {
    scope: __uv$config.prefix
  }).then(reg => {
    setStatus('<span class="ok">● UV active</span> — proxied through Ultraviolet');

    // If a SW is already active and controlling, we're good immediately.
    if (navigator.serviceWorker.controller) return reg;

    // Otherwise wait for the new SW to activate and take control.
    return new Promise(resolve => {
      const onController = () => {
        navigator.serviceWorker.removeEventListener('controllerchange', onController);
        resolve(reg);
      };
      // If it activates before controllerchange fires, catch that too.
      if (reg.active) { resolve(reg); return; }
      reg.installing?.addEventListener('statechange', function () {
        if (this.state === 'activated') resolve(reg);
      });
      navigator.serviceWorker.addEventListener('controllerchange', onController);
    });
  }).catch(err => {
    setStatus('SW failed — serve from a web server, not file://.');
    console.warn('[lightning] SW error:', err);
    throw err;
  });
}

// Pre-register on load so it's ready before first use
window.addEventListener('load', () => ensureSW().catch(() => {}));

// ══ Navigation ═════════════════════════════════════════════
const backBtn = document.getElementById('back-btn');

function goTo(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  backBtn.classList.toggle('visible', id !== 'home');
}

backBtn.addEventListener('click', () => goTo('home'));

document.querySelectorAll('[data-goto]').forEach(el =>
  el.addEventListener('click', () => goTo(el.dataset.goto))
);

// Nav icons that open a URL via proxy
document.querySelectorAll('[data-open-proxy]').forEach(el =>
  el.addEventListener('click', () => openModal(el.dataset.openProxy, el.dataset.openProxy, true))
);

// ══ Engine picker ══════════════════════════════════════════
let engine = 'https://duckduckgo.com/?q=';

document.getElementById('engine-select').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('engine-dd').classList.toggle('open');
});
document.querySelectorAll('.engine-opt').forEach(o => {
  o.addEventListener('click', e => {
    e.stopPropagation();
    engine = o.dataset.engine;
    document.getElementById('engine-label').textContent = o.textContent.trim();
    document.querySelectorAll('.engine-opt').forEach(x => x.classList.remove('chosen'));
    o.classList.add('chosen');
    document.getElementById('engine-dd').classList.remove('open');
  });
});
document.addEventListener('click', () =>
  document.getElementById('engine-dd').classList.remove('open')
);

// ══ Home search — always through UV ════════════════════════
function homeSearch() {
  const q = document.getElementById('home-search').value.trim();
  if (!q) return;
  const url = resolveSearchUrl(q, engine);
  openModal(url, url, true);
}

document.getElementById('search-go').addEventListener('click', homeSearch);
document.getElementById('home-search').addEventListener('keydown', e => {
  if (e.key === 'Enter') homeSearch();
});

// ══ Modal open ═════════════════════════════════════════════
/**
 * @param {string}  url      - destination URL or relative path
 * @param {string}  title    - label shown in the modal bar
 * @param {boolean} forceUV  - force UV even for relative paths
 */
function openModal(url, title, forceUV = false) {
  const needsProxy = forceUV || isAbsoluteUrl(url);

  // Show modal immediately with a loading state
  document.getElementById('modal-title').textContent = title || url;
  document.getElementById('game-frame').src = '';
  document.getElementById('modal').classList.add('open');

  if (needsProxy) {
    // Mirror download.js: register SW first, THEN set src.
    // This guarantees the service worker intercepts the request.
    ensureSW().then(() => {
      let target = url;
      if (!isUrl(target)) target = 'https://www.google.com/search?q=' + encodeURIComponent(target);
      else if (!/^https?:\/\//i.test(target)) target = 'https://' + target;
      document.getElementById('game-frame').src =
        __uv$config.prefix + __uv$config.encodeUrl(target);
    }).catch(() => {
      document.getElementById('modal-title').textContent = 'UV unavailable — serve from a web server';
    });
  } else {
    // Relative path (e.g. /games/slope) — load directly, no proxy needed
    document.getElementById('game-frame').src = url;
  }
}

// ══ Fullscreen button ══════════════════════════════════════
const fsBtn     = document.getElementById('fullscreen-btn');
const fsExpand  = document.getElementById('fs-expand');
const fsShrink  = document.getElementById('fs-shrink');
const fsLabel   = document.getElementById('fs-label');
const gameFrame = document.getElementById('game-frame');

fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    // Request fullscreen on the iframe itself
    (gameFrame.requestFullscreen?.() ||
     gameFrame.webkitRequestFullscreen?.() ||
     gameFrame.mozRequestFullScreen?.())
  } else {
    (document.exitFullscreen?.() ||
     document.webkitExitFullscreen?.() ||
     document.mozCancelFullScreen?.())
  }
});

document.addEventListener('fullscreenchange', updateFsBtn);
document.addEventListener('webkitfullscreenchange', updateFsBtn);

function updateFsBtn() {
  const isFs = !!document.fullscreenElement;
  fsExpand.style.display = isFs ? 'none'  : '';
  fsShrink.style.display = isFs ? ''      : 'none';
  fsLabel.textContent    = isFs ? 'Exit'  : 'Fullscreen';
}

// ══ Close modal ════════════════════════════════════════════
function closeModal() {
  document.getElementById('game-frame').src = '';
  document.getElementById('modal').classList.remove('open');
  // Reset fullscreen icon in case they closed without exiting FS
  fsExpand.style.display = '';
  fsShrink.style.display = 'none';
  fsLabel.textContent    = 'Fullscreen';
}
document.getElementById('close-modal').addEventListener('click', closeModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ══ Proxy page — always UV ═════════════════════════════════
function proxyGo() {
  const raw = document.getElementById('proxy-input').value.trim();
  if (!raw) return;
  const url = resolveSearchUrl(raw, 'https://duckduckgo.com/?q=');
  openModal(url, url, true);
}
document.getElementById('proxy-go').addEventListener('click', proxyGo);
document.getElementById('proxy-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') proxyGo();
});

// ══ Games ══════════════════════════════════════════════════
const GAMES_URL = '/games.json';
let allGames = [], gFilter = 'all', gQuery = '';

const esc = s =>
  String(s)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

function renderGames() {
  let list = allGames;
  if (gFilter === 'new') list = list.filter(g => g.new);
  if (gQuery) {
    const q = gQuery.toLowerCase();
    list = list.filter(g => g.name.toLowerCase().includes(q));
  }

  document.querySelector('.chip[data-filter="all"]').textContent = `All ${allGames.length}`;

  const grid = document.getElementById('game-grid');

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="ei">🕹️</div><span>No games found</span></div>`;
    return;
  }

  grid.innerHTML = list.map((g, i) => {
    const needsProxy = isAbsoluteUrl(g.url);
    return `
      <div class="game-card"
           data-url="${esc(g.url)}"
           data-name="${esc(g.name)}"
           style="animation-delay:${Math.min(i * 10, 500)}ms">
        ${g.image
          ? `<img class="card-img" src="${esc(g.image)}" alt="${esc(g.name)}" loading="lazy"
                 onerror="this.outerHTML='<div class=card-placeholder>🎮</div>'">`
          : `<div class="card-placeholder">🎮</div>`}
        ${needsProxy ? `<div class="badge-proxy">UV</div>` : ''}
        ${g.new ? `<div class="badge-new">new</div>` : ''}
        <div class="card-overlay">
          <div class="card-play">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </div>
          <div class="card-name-tip">${esc(g.name)}</div>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.game-card').forEach(card => {
    card.addEventListener('click', () => {
      // openModal handles the routing decision internally
      openModal(card.dataset.url, card.dataset.name);
    });
  });
}

fetch(GAMES_URL)
  .then(r => r.json())
  .then(data => { allGames = data; renderGames(); })
  .catch(() => {
    document.getElementById('game-grid').innerHTML =
      `<div class="empty-state"><div class="ei">⚠️</div><span>Failed to load games</span></div>`;
  });

document.getElementById('game-search').addEventListener('input', e => {
  gQuery = e.target.value.trim();
  renderGames();
});

document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  gFilter = c.dataset.filter;
  renderGames();
}));
</script>
</body>
</html>
